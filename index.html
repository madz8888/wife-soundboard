<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wife Soundboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <img src="avatar.png" alt="Wife Avatar" class="avatar">
    <h1>Wife Soundboard</h1>

    <div class="buttons">
      <button onclick="playSound('does_this_live_here')">Does this live here?</button>
      <button onclick="playSound('go_schweety_go')">Go schweety, go!</button>
      <!-- You can add more buttons like this: -->
      <!-- <button onclick="playSound('another_line')">Another line</button> -->
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
